<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 自动化实验平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === CSS Reset & Custom Properties === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-base: #0b0e14;
  --bg-surface: #141820;
  --bg-elevated: #1a1f2e;
  --bg-hover: #222838;
  --border: #2a2f3e;
  --border-light: #353b4e;
  --text-primary: #e2e5ed;
  --text-secondary: #8b90a0;
  --text-muted: #5c6070;
  --accent-blue: #4f8ff7;
  --accent-blue-dim: rgba(79,143,247,0.15);
  --accent-green: #34d399;
  --accent-green-dim: rgba(52,211,153,0.15);
  --accent-red: #f87171;
  --accent-red-dim: rgba(248,113,113,0.15);
  --accent-yellow: #fbbf24;
  --accent-yellow-dim: rgba(251,191,36,0.15);
  --accent-purple: #a78bfa;
  --accent-purple-dim: rgba(167,139,250,0.15);
  --sidebar-w: 240px;
  --topbar-h: 56px;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --transition: 0.2s ease;
}
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}
a { color: var(--accent-blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* === Layout === */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform var(--transition);
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700; color: var(--text-primary);
}
.sidebar-logo .logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #fff;
}
.nav-links { list-style: none; padding: 12px 8px; flex: 1; }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius);
  color: var(--text-secondary); cursor: pointer;
  transition: all var(--transition); font-size: 13.5px; font-weight: 500;
  margin-bottom: 2px;
}
.nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-link.active {
  background: var(--accent-blue-dim); color: var(--accent-blue);
}
.nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-muted);
}

#main {
  margin-left: var(--sidebar-w);
  height: 100vh; display: flex; flex-direction: column;
}
#topbar {
  height: var(--topbar-h); min-height: var(--topbar-h);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
#content {
  flex: 1; overflow-y: auto; padding: 24px;
}

/* === Components === */
.page { display: none; }
.page.active { display: block; }

.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
}
.stat-card .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; }
.stat-card .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 600; font-size: 14px;
}

.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 16px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); font-weight: 600;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elevated);
}
.data-table td {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; vertical-align: middle;
}
.data-table tr:hover td { background: var(--bg-hover); }
.data-table tr:last-child td { border-bottom: none; }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.badge--success { background: var(--accent-green-dim); color: var(--accent-green); }
.badge--failed { background: var(--accent-red-dim); color: var(--accent-red); }
.badge--running { background: var(--accent-blue-dim); color: var(--accent-blue); }
.badge--pending { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
.badge--warning { background: var(--accent-yellow-dim); color: var(--accent-yellow); }
.badge--purple { background: var(--accent-purple-dim); color: var(--accent-purple); }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge--running .badge-dot { animation: pulse 1.5s infinite; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; border: none;
  cursor: pointer; transition: all var(--transition);
  font-family: inherit;
}
.btn--primary { background: var(--accent-blue); color: #fff; }
.btn--primary:hover { background: #3d7de0; }
.btn--danger { background: var(--accent-red); color: #fff; }
.btn--danger:hover { background: #e05858; }
.btn--ghost {
  background: transparent; color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn--ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn--sm { padding: 5px 10px; font-size: 12px; }

/* Pipeline Visualization */
.pipeline { display: flex; align-items: flex-start; gap: 0; padding: 20px 0; overflow-x: auto; }
.pipeline-node {
  display: flex; flex-direction: column; align-items: center;
  min-width: 90px; position: relative;
}
.pipeline-node:not(:last-child)::after {
  content: ''; position: absolute;
  top: 16px; left: calc(50% + 18px); width: calc(100% - 36px);
  height: 2px; background: var(--border);
}
.pipeline-node.completed:not(:last-child)::after { background: var(--accent-green); }
.pipeline-node.active:not(:last-child)::after {
  background: linear-gradient(90deg, var(--accent-blue), var(--border));
}
.pipeline-dot {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg-elevated); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; z-index: 1; transition: all 0.3s;
}
.pipeline-node.completed .pipeline-dot {
  background: var(--accent-green-dim); border-color: var(--accent-green); color: var(--accent-green);
}
.pipeline-node.active .pipeline-dot {
  background: var(--accent-blue-dim); border-color: var(--accent-blue); color: var(--accent-blue);
  animation: pulse 1.5s infinite; box-shadow: 0 0 12px var(--accent-blue-dim);
}
.pipeline-node.failed .pipeline-dot {
  background: var(--accent-red-dim); border-color: var(--accent-red); color: var(--accent-red);
}
.pipeline-label {
  margin-top: 8px; font-size: 11px; color: var(--text-muted);
  text-align: center; white-space: nowrap;
}
.pipeline-node.completed .pipeline-label { color: var(--accent-green); }
.pipeline-node.active .pipeline-label { color: var(--accent-blue); font-weight: 600; }
.pipeline-node.failed .pipeline-label { color: var(--accent-red); }

/* Log Viewer */
.log-viewer {
  background: #0a0d12; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  max-height: 400px; overflow-y: auto;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  line-height: 1.7;
}
.log-viewer .log-line { white-space: pre-wrap; word-break: break-all; }
.log-viewer .log-time { color: var(--text-muted); }
.log-viewer .log-info { color: var(--accent-blue); }
.log-viewer .log-success { color: var(--accent-green); }
.log-viewer .log-error { color: var(--accent-red); }
.log-viewer .log-warn { color: var(--accent-yellow); }

/* AI Analysis Card */
.ai-card {
  background: var(--bg-surface); border: 1px solid var(--accent-purple);
  border-radius: var(--radius-lg); padding: 20px; margin: 16px 0;
  border-left: 3px solid var(--accent-purple);
}
.ai-card h4 { color: var(--accent-purple); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.ai-section { margin-bottom: 12px; }
.ai-section-title { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.ai-section-content { font-size: 13px; line-height: 1.7; }

/* Forms */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px;
  background: var(--bg-base); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-primary);
  font-size: 13px; font-family: inherit;
  transition: border-color var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none; border-color: var(--accent-blue);
}
.form-textarea { min-height: 80px; resize: vertical; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); width: 90%; max-width: 520px;
  max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 600;
}
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}
.modal-close {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 18px; padding: 4px;
}
.modal-close:hover { color: var(--text-primary); }

/* Toast */
#toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 16px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow); animation: slideIn 0.3s ease;
  display: flex; align-items: center; gap: 8px;
}
.toast--success { background: #0f2a1e; border: 1px solid var(--accent-green); color: var(--accent-green); }
.toast--error { background: #2a0f0f; border: 1px solid var(--accent-red); color: var(--accent-red); }
.toast--info { background: #0f1a2a; border: 1px solid var(--accent-blue); color: var(--accent-blue); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

/* Verify Table */
.verify-table .pass { color: var(--accent-green); }
.verify-table .fail { color: var(--accent-red); }

/* Report Sections */
.report-section { margin-bottom: 24px; }
.report-section h3 {
  font-size: 15px; margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.report-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.report-meta-item .label { font-size: 11px; color: var(--text-muted); }
.report-meta-item .value { font-size: 14px; font-weight: 500; }

/* Project Cards */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.project-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px;
  transition: border-color var(--transition);
}
.project-card:hover { border-color: var(--border-light); }
.project-card h3 { font-size: 15px; margin-bottom: 8px; }
.project-card .project-repo { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; word-break: break-all; }
.project-card .project-actions { display: flex; gap: 8px; margin-top: 12px; }

/* Status bar chart */
.status-bars { padding: 16px 20px; }
.status-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.status-bar-label { width: 60px; font-size: 12px; color: var(--text-secondary); text-align: right; }
.status-bar-track { flex: 1; height: 20px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
.status-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; color: #fff; }
.status-bar-count { width: 30px; font-size: 12px; color: var(--text-muted); text-align: right; }

/* Filter bar */
.filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar .form-select, .filter-bar .form-input { width: auto; min-width: 140px; padding: 7px 10px; }

/* Empty state */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* Responsive */
@media (max-width: 1024px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: none; }
  #main { margin-left: 0; }
  .stat-grid { grid-template-columns: 1fr; }
  .report-meta { grid-template-columns: 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab {
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
}
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

/* Detail sections */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.detail-item .detail-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.detail-item .detail-value { font-size: 14px; font-weight: 500; }
@media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

.section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="logo-icon">AI</div>
      <span>AI 实验平台</span>
    </div>
  </div>
  <ul class="nav-links">
    <li class="nav-link active" data-page="dashboard" onclick="App.navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

      <span>测试运行</span>
    </li>
    <li class="nav-link" data-page="reports" onclick="App.navigate('reports')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>测试报告</span>
    </li>
    <li class="nav-link" data-page="vmware" onclick="App.navigate('vmware')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>

  </ul>
  <div class="sidebar-footer">AI 自动化实验平台 v1.0</div>
</nav>

<!-- MAIN -->
<div id="main">
  <header id="topbar">
    <div class="topbar-title" id="page-title">仪表盘</div>
    <div class="topbar-actions">
      <button class="btn btn--primary btn--sm" onclick="App.createRun()">+ 新建测试</button>
    </div>
  </header>
  <div id="content">
    <!-- PAGE: Dashboard -->
    <section id="page-dashboard" class="page active"></section>
    <!-- PAGE: Projects -->
    <section id="page-projects" class="page"></section>
    <!-- PAGE: Runs -->
    <section id="page-runs" class="page"></section>
    <!-- PAGE: Run Detail -->
    <section id="page-run-detail" class="page"></section>
    <!-- PAGE: Reports -->
    <section id="page-reports" class="page"></section>
    <!-- PAGE: Report Detail -->
    <section id="page-report-detail" class="page"></section>
    <!-- PAGE: VMware -->
    <section id="page-vmware" class="page"></section>
    <!-- PAGE: Settings -->
    <section id="page-settings" class="page"></section>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title"></span>
      <button class="modal-close" onclick="App.closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
const App = {
  state: { currentPage: 'dashboard', polling: null, projects: [], runDetailId: null },

  // === API Client ===
  api: {
    async get(url) {
      try { const r = await fetch(url); if (!r.ok) throw new Error(r.statusText); return r.json(); }
      catch(e) { App.toast('请求失败: ' + e.message, 'error'); return null; }
    },
    async post(url, data) {
      try { const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) }); return r.json(); }
      catch(e) { App.toast('请求失败: ' + e.message, 'error'); return null; }
    },
    async put(url, data) {
      try { const r = await fetch(url, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) }); return r.json(); }
      catch(e) { App.toast('请求失败: ' + e.message, 'error'); return null; }
    },
    async del(url) {
      try { const r = await fetch(url, { method:'DELETE' }); return r.json(); }
      catch(e) { App.toast('请求失败: ' + e.message, 'error'); return null; }
    }
  },

  // === Navigation ===
  navigate(page, id) {
    this.stopPolling();
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    const basePage = page.split('-')[0] === 'run' ? 'runs' : (page.split('-')[0] === 'report' ? 'reports' : (page === 'vmware' ? 'vmware' : page));
    const navEl = document.querySelector(`.nav-link[data-page="${basePage}"]`);
    if (navEl) navEl.classList.add('active');
    const titles = { dashboard:'仪表盘', projects:'项目管理', runs:'测试运行', 'run-detail':'运行详情', reports:'测试报告', 'report-detail':'报告详情', vmware:'虚拟机管理', settings:'系统设置' };
    document.getElementById('page-title').textContent = titles[page] || page;
    const pageEl = document.getElementById('page-' + page);
    if (pageEl) pageEl.classList.add('active');
    this.state.currentPage = page;
    switch(page) {
      case 'dashboard': this.loadDashboard(); break;
      case 'projects': this.loadProjects(); break;
      case 'runs': this.loadRuns(); break;
      case 'run-detail': this.loadRunDetail(id); break;
      case 'reports': this.loadReports(); break;
      case 'report-detail': this.loadReportDetail(id); break;
      case 'vmware': this.loadVMware(); break;
      case 'settings': this.loadSettings(); break;
    }
  },

  stopPolling() {
    if (this.state.polling) { clearInterval(this.state.polling); this.state.polling = null; }
  },

  // === Utility Functions ===
  toast(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast toast--' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  },

  showModal(title, bodyHTML, footerHTML) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHTML;
    document.getElementById('modal-footer').innerHTML = footerHTML || '';
    document.getElementById('modal-overlay').classList.add('active');
  },

  closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  },

  statusBadge(status) {
    const map = {
      'success': ['success','成功'], 'failed': ['failed','失败'], 'pending': ['pending','等待中'],
      'init_vm': ['running','初始化VM'], 'snapshot': ['running','创建快照'],
      'code_pull': ['running','拉取代码'], 'upload': ['running','上传安装包'],
      'install': ['running','安装中'], 'verify': ['running','验证中'],
      'ai_analyze': ['purple','AI分析'], 'ai_fix': ['purple','AI修复'],
      'rollback': ['warning','回滚中']
    };
    const [cls, label] = map[status] || ['pending', status];
    return `<span class="badge badge--${cls}"><span class="badge-dot"></span>${label}</span>`;
  },

  statusLabel(status) {
    const map = { success:'成功', failed:'失败', pending:'等待中', init_vm:'初始化VM', snapshot:'创建快照', code_pull:'拉取代码', upload:'上传安装包', install:'安装中', verify:'验证中', ai_analyze:'AI分析', ai_fix:'AI修复', rollback:'回滚中' };
    return map[status] || status;
  },

  pipelineHTML(currentStatus) {
    const stages = [
      { key:'init_vm', label:'初始化VM', icon:'1' },
      { key:'snapshot', label:'创建快照', icon:'2' },
      { key:'code_pull', label:'拉取代码', icon:'3' },
      { key:'upload', label:'上传安装包', icon:'4' },
      { key:'install', label:'执行安装', icon:'5' },
      { key:'verify', label:'验证测试', icon:'6' },
      { key:'ai_analyze', label:'AI分析', icon:'A' },
      { key:'ai_fix', label:'AI修复', icon:'F' },
      { key:'rollback', label:'回滚VM', icon:'R' },
      { key:'success', label:'完成', icon:'&#10003;' }
    ];
    const order = stages.map(s => s.key);
    const ci = order.indexOf(currentStatus);
    const isFailed = currentStatus === 'failed';
    return '<div class="pipeline">' + stages.map((s, i) => {
      let cls = '';
      if (isFailed) {
        cls = i < ci ? 'completed' : (i === ci ? 'failed' : '');
      } else if (currentStatus === 'success') {
        cls = 'completed';
      } else {
        cls = i < ci ? 'completed' : (i === ci ? 'active' : '');
      }
      return `<div class="pipeline-node ${cls}"><div class="pipeline-dot">${s.icon}</div><div class="pipeline-label">${s.label}</div></div>`;
    }).join('') + '</div>';
  },

  formatDate(d) {
    if (!d) return '-';
    const dt = new Date(d);
    return dt.toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  },

  formatDuration(start, end) {
    if (!start) return '-';
    const s = new Date(start);
    const e = end ? new Date(end) : new Date();
    const diff = Math.floor((e - s) / 1000);
    if (diff < 60) return diff + '秒';
    if (diff < 3600) return Math.floor(diff/60) + '分' + (diff%60) + '秒';
    return Math.floor(diff/3600) + '时' + Math.floor((diff%3600)/60) + '分';
  },

        const pct = Math.round(c/total*100);

    const body = `

  async saveProject(id) {
    const data = {
      name: document.getElementById('pf-name').value,
      repo_url: document.getElementById('pf-repo').value,
      install_script: document.getElementById('pf-install').value,
      verify_script: document.getElementById('pf-verify').value,
      config: document.getElementById('pf-config').value
    };

    if (!data.name) { this.toast('请输入项目名称', 'error'); return; }
    if (id) { await this.api.put('/api/projects/' + id, data); }
    else { await this.api.post('/api/projects', data); }
    this.closeModal();
    this.toast(id ? '项目已更新' : '项目已创建', 'success');
    this.loadProjects();

    if (!confirm('确定删除此项目?')) return;

    this.toast('项目已删除', 'success');
    this.loadProjects();

    const r = await this.api.post('/api/runs', { project_id: projectId });

  // === Run Detail ===
  _runDetailStatus: null,
  _pollingBusy: false,

  async loadRunDetail(id) {
    this.state.runDetailId = id;
    this._runDetailStatus = null;
    this._pollingBusy = false;
    const el = document.getElementById('page-run-detail');
    const run = await this.api.get('/api/runs/' + id);
    if (!run) { el.innerHTML = '<div class="empty-state"><p>运行记录不存在</p></div>'; return; }
    this._runDetailStatus = run.status;
    this._renderRunDetail(el, run);
    // Load logs
    const logs = await this.api.get('/api/runs/' + id + '/logs');
    this._renderLogs(logs);
    this._renderAI(run);
    this._renderVerify(run);
    // Start polling if active - only one interval, no recursion
    const isActive = !['success','failed'].includes(run.status);
    if (isActive) {
      this.state.polling = setInterval(() => this._pollRunDetail(id), 3000);
    }
  },

  async _pollRunDetail(id) {
    if (this._pollingBusy) return;
    if (this.state.currentPage !== 'run-detail') { this.stopPolling(); return; }
    this._pollingBusy = true;
    try {
      const [run, logs] = await Promise.all([
        this.api.get('/api/runs/' + id),
        this.api.get('/api/runs/' + id + '/logs')
      ]);
      if (!run) return;
      // If status changed, update the full layout once (no recursive call)
      if (run.status !== this._runDetailStatus) {
        this._runDetailStatus = run.status;
        const el = document.getElementById('page-run-detail');
        if (el) this._renderRunDetail(el, run);
      }
      this._renderLogs(logs);
      this._renderAI(run);
      this._renderVerify(run);
      // Stop polling if run finished
      if (['success','failed'].includes(run.status)) {
        this.stopPolling();
        // Final full re-render to show retry button etc.
        const el = document.getElementById('page-run-detail');
        if (el) this._renderRunDetail(el, run);
        this._renderLogs(logs);
        this._renderAI(run);
        this._renderVerify(run);
      }
    } finally {
      this._pollingBusy = false;
    }
  },

  _renderRunDetail(el, run) {
    // Preserve current active tab
    const activeTab = el.querySelector && el.querySelector('#run-tabs .tab.active');
    const currentTab = activeTab ? activeTab.dataset.tab : 'logs';
    el.innerHTML = `
      <div class="flex-between mb-16">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn btn--ghost btn--sm" onclick="App.navigate('runs')">&larr; 返回</button>
          <span class="section-title">测试运行 #${run.id}</span>
          ${this.statusBadge(run.status)}
          ${run.failure_code?`<span class="badge badge--warning" style="margin-left:4px">${run.failure_code}</span>`:''}
        </div>
        <div style="display:flex;gap:8px">
          ${run.status==='failed'?`<button class="btn btn--primary btn--sm" onclick="App.retryRun(${run.id})">重试</button>`:''}
        </div>
      </div>
      ${this.pipelineHTML(run.status)}
      <div class="detail-grid mb-24">
        <div class="detail-item"><div class="detail-label">项目名称</div><div class="detail-value">${this.escHtml(run.project_name||'-')}</div></div>
        <div class="detail-item"><div class="detail-label">修复分支</div><div class="detail-value" style="font-family:'JetBrains Mono',monospace;font-size:12px">${this.escHtml(run.branch_name||'-')}</div></div>
        <div class="detail-item"><div class="detail-label">开始时间</div><div class="detail-value">${this.formatDate(run.start_time)}</div></div>
        <div class="detail-item"><div class="detail-label">耗时</div><div class="detail-value">${this.formatDuration(run.start_time, run.end_time)}</div></div>
        <div class="detail-item"><div class="detail-label">重试次数</div><div class="detail-value">${run.current_retry||0} / ${run.retry_count||10}</div></div>
        <div class="detail-item"><div class="detail-label">VM 信息</div><div class="detail-value">${run.vm_info?`${run.vm_info.ip||''} (${run.vm_info.hostname||''})`:'分配中...'}</div></div>
      </div>
      <div class="tabs" id="run-tabs">
        <div class="tab ${currentTab==='logs'?'active':''}" data-tab="logs" onclick="App.switchRunTab('logs')">运行日志</div>
        <div class="tab ${currentTab==='ai'?'active':''}" data-tab="ai" onclick="App.switchRunTab('ai')">AI 分析</div>
        <div class="tab ${currentTab==='verify'?'active':''}" data-tab="verify" onclick="App.switchRunTab('verify')">验证结果</div>
      </div>
      <div id="run-tab-logs" class="run-tab-content" style="${currentTab==='logs'?'':'display:none'}">
        <div class="log-viewer" id="log-viewer"></div>
      </div>
      <div id="run-tab-ai" class="run-tab-content" style="${currentTab==='ai'?'':'display:none'}"></div>
      <div id="run-tab-verify" class="run-tab-content" style="${currentTab==='verify'?'':'display:none'}"></div>`;
  },

  switchRunTab(tab) {
    document.querySelectorAll('#run-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    ['logs','ai','verify'].forEach(t => {
      const el = document.getElementById('run-tab-' + t);
      if (el) el.style.display = t === tab ? 'block' : 'none';
    });
  },

  _renderLogs(logs) {
    if (!logs) return;
    const viewer = document.getElementById('log-viewer');
    if (!viewer) return;
    const wasAtBottom = viewer.scrollHeight - viewer.scrollTop - viewer.clientHeight < 50;
    viewer.innerHTML = logs.map(l => {
      let cls = 'log-line';
      const c = l.content || '';
      if (c.includes('ERROR') || c.includes('FATAL') || c.includes('失败')) cls += ' log-error';
      else if (c.includes('SUCCESS') || c.includes('成功') || c.includes('通过')) cls += ' log-success';
      else if (c.includes('WARNING') || c.includes('警告')) cls += ' log-warn';
      else if (c.includes('[INFO]') || c.includes('>>>')) cls += ' log-info';
      return `<div class="${cls}"><span class="log-time">[${this.formatDate(l.created_at)}]</span> <span>[${l.phase||''}]</span> ${this.escHtml(c)}</div>`;
    }).join('');
    if (wasAtBottom) viewer.scrollTop = viewer.scrollHeight;
  },

  _renderAI(run) {
    const el = document.getElementById('run-tab-ai');
    if (!el) return;
    if (!run || !run.analyses || run.analyses.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>暂无 AI 分析记录</p></div>';
      return;
    }
    el.innerHTML = run.analyses.map((a, i) => `
      <div class="ai-card">
        <h4>&#129302; AI 分析 - 第 ${a.round_number||i+1} 轮</h4>
        <div class="ai-section"><div class="ai-section-title">根因判断</div><div class="ai-section-content">${this.escHtml(a.root_cause||'')}</div></div>
        <div class="ai-section"><div class="ai-section-title">修复方案</div><div class="ai-section-content">${this.escHtml(a.fix_plan||'')}</div></div>

  _renderVerify(run) {
    const el = document.getElementById('run-tab-verify');

      el.innerHTML = '<div class="empty-state"><p>暂无验证结果</p></div>';
      return;

    const rounds = {};
    run.verify_results.forEach(v => { const rn = v.round_number||1; if(!rounds[rn]) rounds[rn]=[]; rounds[rn].push(v); });
    el.innerHTML = Object.entries(rounds).map(([rn, items]) => `

      <table class="data-table verify-table"><thead><tr><th>验证项</th><th>状态</th><th>详情</th></tr></thead>

        <td style="font-size:12px;color:var(--text-muted)">${this.escHtml(v.detail||'')}</td>
      </tr>`).join('')}</tbody></table></div>`).join('');

  async saveVMwareConfig() {
    const data = {
      vmrun_path: document.getElementById('vm-vmrun-path').value,
      vmware_host_type: document.getElementById('vm-host-type').value,
      default_template_dir: document.getElementById('vm-template-dir').value,
      default_clone_dir: document.getElementById('vm-clone-dir').value,
      default_snapshot_name: document.getElementById('vm-snapshot-name').value,
      ssh_user: document.getElementById('vm-ssh-user').value,
      ssh_port: parseInt(document.getElementById('vm-ssh-port').value) || 22,
      ssh_key_path: document.getElementById('vm-ssh-key').value,
      ssh_timeout: parseInt(document.getElementById('vm-ssh-timeout').value) || 120,
      simulation: document.getElementById('vm-simulation').checked,
    };
    const pw = document.getElementById('vm-ssh-password').value;
    if (pw) data.ssh_password = pw;
    await this.api.put('/api/vmware/config', data);

  },

            失败通知将包含: 失败分类编码 + 失败原因摘要 + AI 分析结果 + 修复分支地址
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn--primary" onclick="App.saveSettings()">保存设置</button>
            <button class="btn btn--ghost" onclick="App.testNotify()">测试通知</button>
          </div>
        </div>
      </div>

      <!-- Timeout Config -->
      <div class="card" style="max-width:800px">
        <div class="card-header">超时与重试配置</div>
        <div style="padding:20px">
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">单步超时</div><div class="detail-value">30 分钟</div></div>
            <div class="detail-item"><div class="detail-label">整体超时</div><div class="detail-value">4 小时</div></div>
            <div class="detail-item"><div class="detail-label">最大重试次数</div><div class="detail-value">10 次</div></div>
            <div class="detail-item"><div class="detail-label">AI 修改范围</div><div class="detail-value">scripts/ config/</div></div>
          </div>
        </div>
      </div>`;
  },

  showAddAccountModal(serviceType) {
    const body = `
      <div class="form-group"><label class="form-label">账号</label>
        <input class="form-input" id="acct-account" placeholder="用户名 / 邮箱"></div>
      <div class="form-group"><label class="form-label">密码 / 密钥</label>
        <input class="form-input" id="acct-secret" type="password" placeholder="${this._secretPlaceholders[serviceType]||'密码/密钥'}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">优先级 (越小越优先)</label>
          <input class="form-input" id="acct-priority" type="number" value="0"></div>
        <div class="form-group"><label class="form-label">积分余额</label>
          <input class="form-input" id="acct-balance" type="number" step="0.1" value="100"></div>
        <div class="form-group"><label class="form-label">积分阈值</label>
          <input class="form-input" id="acct-threshold" type="number" step="0.1" value="10"></div>
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="acct-enabled" checked> 启用</label>`;
    const footer = `<button class="btn btn--ghost" onclick="App.closeModal()">取消</button>
      <button class="btn btn--primary" onclick="App.saveNewAccount('${serviceType}')">保存</button>`;
    this.showModal('添加 ' + (this._serviceLabels[serviceType]||serviceType) + ' 账号', body, footer);
  },

  async saveNewAccount(serviceType) {
    const data = {
      service_type: serviceType,
      account: document.getElementById('acct-account').value,
      secret: document.getElementById('acct-secret').value,
      priority: parseInt(document.getElementById('acct-priority').value) || 0,
      credit_balance: parseFloat(document.getElementById('acct-balance').value) || 100,
      credit_threshold: parseFloat(document.getElementById('acct-threshold').value) || 10,
      enabled: document.getElementById('acct-enabled').checked,
    };
    if (!data.account) { this.toast('请输入账号', 'error'); return; }
    await this.api.post('/api/settings/credentials', data);
    this.closeModal();
    this.toast('账号已添加', 'success');
    this.loadSettings();
  },

  async showEditAccountModal(id, serviceType) {
    const accounts = await this.api.get('/api/settings/credentials/' + serviceType);
    const a = (accounts||[]).find(x => x.id === id);
    if (!a) return;
    const body = `
      <div class="form-group"><label class="form-label">账号</label>
        <input class="form-input" id="acct-account" value="${this.escHtml(a.account)}"></div>
      <div class="form-group"><label class="form-label">密码 / 密钥 (留空不更改)</label>
        <input class="form-input" id="acct-secret" type="password" placeholder="${a.secret_masked?'已配置 ('+a.secret_masked+')':'密码/密钥'}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">优先级</label>
          <input class="form-input" id="acct-priority" type="number" value="${a.priority}"></div>
        <div class="form-group"><label class="form-label">积分余额</label>
          <input class="form-input" id="acct-balance" type="number" step="0.1" value="${a.credit_balance}"></div>
        <div class="form-group"><label class="form-label">积分阈值</label>
          <input class="form-input" id="acct-threshold" type="number" step="0.1" value="${a.credit_threshold}"></div>
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="acct-enabled" ${a.enabled?'checked':''}> 启用</label>`;
    const footer = `<button class="btn btn--ghost" onclick="App.closeModal()">取消</button>
      <button class="btn btn--primary" onclick="App.updateAccount(${id})">保存</button>`;
    this.showModal('编辑账号', body, footer);
  },

  async updateAccount(id) {
    const data = {
      account: document.getElementById('acct-account').value,
      priority: parseInt(document.getElementById('acct-priority').value) || 0,
      credit_balance: parseFloat(document.getElementById('acct-balance').value) || 0,
      credit_threshold: parseFloat(document.getElementById('acct-threshold').value) || 10,
      enabled: document.getElementById('acct-enabled').checked,
    };
    const secret = document.getElementById('acct-secret').value;
    if (secret) data.secret = secret;
    await this.api.put('/api/settings/credentials/' + id, data);
    this.closeModal();
    this.toast('账号已更新', 'success');
    this.loadSettings();
  },

  async deleteAccount(id) {
    if (!confirm('确定删除此账号?')) return;
    await this.api.del('/api/settings/credentials/' + id);
    this.toast('账号已删除', 'success');
    this.loadSettings();
  },

  async testCredential(id) {
    const r = await this.api.post('/api/settings/credentials/' + id + '/test', {});
    if (r && r.success) this.toast(r.message, 'success');
    else this.toast(r && r.error ? r.error : '测试失败', 'error');
  },

  async rechargeCredit(id) {
    const amount = prompt('请输入充值积分数量:');
    if (!amount || isNaN(amount) || parseFloat(amount) <= 0) return;
    await this.api.post('/api/credits/' + id + '/recharge', { amount: parseFloat(amount) });
    this.toast('充值成功', 'success');
    this.loadSettings();
  },

  async saveSettings() {
    await this.api.put('/api/settings/notify', {
      webhook_url: document.getElementById('set-webhook').value,
      enabled: document.getElementById('set-enabled').checked,
      notify_on_success: document.getElementById('set-success').checked,
      notify_on_failure: document.getElementById('set-failure').checked
    });
    this.toast('设置已保存', 'success');
  },

  async testNotify() {
    const r = await this.api.post('/api/notify/test', {});
    this.toast(r && r.message ? r.message : '通知已发送', 'info');
  },

  // === Helpers ===
  escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },

  init() {
    this.navigate('dashboard');
  }
};

App.init();
</script>
</body>
</html>
